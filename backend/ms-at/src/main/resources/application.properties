spring.application.name=ms-at

spring.jpa.show-sql=true

# =========================================================
# Eureka
# =========================================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://service-registry:8081/eureka/}
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.instance.prefer-ip-address=true

# =========================================================
# Server
# =========================================================
server.port=0
server.error.include-stacktrace=never
server.error.include-message=always

# =========================================================
# SpringDoc
# =========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# =========================================================
# LOGS
# =========================================================
logging.level.org.springframework.security=TRACE
logging.level.io.github.resilience4j=INFO
logging.level.org.springframework.cloud.client.circuitbreaker=INFO
logging.level.feign=INFO

# =========================================================
# OPENFEIGN - TIMEOUTS
# =========================================================

# =========================================================
# RESILIENCE4J - CONFIG BASE
# =========================================================

# =========================================================
# ACTUATOR / HEALTH
# =========================================================
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always

# =========================================================
# BANCO
# =========================================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/atcare_ms_at?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
