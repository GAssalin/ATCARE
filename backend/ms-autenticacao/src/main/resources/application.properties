spring.application.name=ms-auth
spring.jpa.show-sql=true

# =========================================================
# Eureka
# =========================================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://service-registry:8081/eureka/}
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
eureka.instance.prefer-ip-address=true

# =========================================================
# Server
# =========================================================
server.port=0
server.error.include-stacktrace=never
server.error.include-message=always

# =========================================================
# SpringDoc
# =========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# =========================================================
# LOGS
# =========================================================
logging.level.org.springframework.security=TRACE
logging.level.io.github.resilience4j=INFO
logging.level.org.springframework.cloud.client.circuitbreaker=INFO
logging.level.feign=INFO

# =========================================================
# OPENFEIGN - TIMEOUTS
# =========================================================
spring.cloud.openfeign.client.config.ms-pessoa.connectTimeout=2000
spring.cloud.openfeign.client.config.ms-pessoa.readTimeout=3000
spring.cloud.openfeign.client.config.ms-pessoa.loggerLevel=basic

# =========================================================
# RESILIENCE4J - CONFIG BASE
# =========================================================
resilience4j.circuitbreaker.instances.ms-pessoa.sliding-window-size=5
resilience4j.circuitbreaker.instances.ms-pessoa.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.ms-pessoa.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ms-pessoa.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ms-pessoa.permitted-number-of-calls-in-half-open-state=2

# =========================================================
# ACTUATOR / HEALTH
# =========================================================
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always

jwt.secret=${ATCARE_JWT_SECRET}
jwt.issuer=${ATCARE_JWT_ISSUER}
jwt.tempo.exp.token=${ATCARE_TEMPO_EXP_TOKEN}
